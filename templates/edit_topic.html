{% extends "base.html" %}
{% block content %}
<h2>✏️ Редактировать тему</h2>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Название темы *</label>
        <input name="title" class="form-control" value="{{ topic.title }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-control" rows="3">{{ topic.description }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
