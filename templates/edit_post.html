{% extends "base.html" %}
{% block content %}
<h2>✏️ Редактировать пост</h2>
<form method="POST">
    <div class="mb-3">
        <textarea name="content" class="form-control" rows="6" required>{{ post.content }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('post', post_id=post.id) }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
