<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Сайт vs макет Figma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
</head>
<body>
  <div class="bg-grid"></div>
  <header class="top">
    <div class="brand">
      <span class="logo">◇</span>
      <div>
        <h1>Сайт vs Figma</h1>
        <p class="tagline">Скрин страницы · diff · CNN · описание багов (Ollama)</p>
      </div>
    </div>
    <span class="pill" id="connPill">загрузка…</span>
  </header>

  <main class="layout">
    <section class="card panel">
      <h2>Тест вёрстки</h2>
      <label>URL страницы (dev или прод; сейчас проверка — 1920×1080 из config)</label>
      <input type="url" id="urlSite" placeholder="https://…" autocomplete="off" />

      <label>Figma file key</label>
      <input type="text" id="figmaKey" placeholder="из URL файла …/design/KEY/…" autocomplete="off" />

      <label>Figma node id (в ссылке node-id=19-2 → здесь 19:2)</label>
      <input type="text" id="figmaNode" placeholder="19:2" autocomplete="off" />

      <div class="row2">
        <div>
          <label>Масштаб PNG Figma (1–4)</label>
          <input type="number" id="figScale" min="1" max="4" />
        </div>
        <div></div>
      </div>

      <div class="row2">
        <div>
          <label>Окно W</label>
          <input type="number" id="winW" min="320" />
        </div>
        <div>
          <label>Окно H</label>
          <input type="number" id="winH" min="240" />
        </div>
      </div>

      <div class="row2">
        <div>
          <label>Порог отличий %</label>
          <input type="number" id="thr" step="0.01" min="0" />
        </div>
        <div>
          <label>Порог яркости diff</label>
          <input type="number" id="pixThr" min="0" max="255" />
        </div>
      </div>

      <div class="row2">
        <div>
          <label>Сдвиг px (0–5)</label>
          <input type="number" id="shift" min="0" max="5" />
        </div>
        <div>
          <label>Opening (0–5)</label>
          <input type="number" id="speck" min="0" max="5" />
        </div>
      </div>

      <div class="checks">
        <label class="chk"><input type="checkbox" id="useGemma" checked /> Описание багов (Ollama)</label>
        <label class="chk"><input type="checkbox" id="useModel" checked /> CNN по diff</label>
        <label class="chk"><input type="checkbox" id="gemmaImg" checked /> Картинка diff в модель</label>
      </div>

      <button type="button" class="btn primary" id="btnRun">Сравнить с макетом</button>
      <p class="hint">Перед запуском: <code>FIGMA_ACCESS_TOKEN</code>, Chrome. Для текста багов — запущенная Ollama (<code>ollama serve</code>) и модель из config (<code>ollama pull …</code>).</p>
    </section>

    <section class="card output">
      <div class="out-head">
        <h2>Результат</h2>
        <span class="status idle" id="statusBadge">ожидание</span>
      </div>
      <pre class="log" id="logBox"></pre>
      <article class="gemma" id="gemmaBox">
        <h3>Что не совпало с макетом</h3>
        <div class="md" id="gemmaMd"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
